name: Scheduled Data Update

on:
  schedule:
    # 每天北京时间 10:00 (UTC 02:00) 运行
    # 国家统计局旬度数据每月发布约3次，每日检查可确保及时捕获新数据
    - cron: '0 2 * * 1'
  workflow_dispatch:
    # 支持手动触发

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run data update
        run: python py/update.py

      - name: Check for changes
        id: changes
        run: |
          git add data/price_data.db charts/
          git diff --cached --quiet && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push updates
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "data: auto-update $(date -u +'%Y-%m-%d')"
          git push
